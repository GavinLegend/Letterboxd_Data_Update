name: Sync Letterboxd Public Report

on:
  push:
    paths:
      - ".github/workflows/sync-letterboxd-public.yml"
      - "scripts/**"
      - "README.md"
      - ".gitignore"
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"
    - cron: "43 9 * * 0"

permissions:
  contents: write

concurrency:
  group: letterboxd-public-sync
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore sync caches
        id: restore-sync-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .vendor
            data/public-sync/cache
            outputs/public-sync-report
          key: letterboxd-public-sync-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            letterboxd-public-sync-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --target .vendor pandas numpy lxml curl_cffi openpyxl

      - name: Validate scripts
        env:
          PYTHONPATH: .vendor
        run: |
          python -m py_compile scripts/*.py

      - name: Sync from public Letterboxd pages
        env:
          PYTHONPATH: .vendor
          LETTERBOXD_USERNAME: goorison
          SCHEDULE_EXPR: ${{ github.event.schedule }}
        run: |
          FULL_REFRESH_FLAG=""
          if [ "$SCHEDULE_EXPR" = "43 9 * * 0" ]; then
            FULL_REFRESH_FLAG="--force-refresh-all-entry-pages"
          fi
          python scripts/sync_letterboxd_public.py \
            --username "$LETTERBOXD_USERNAME" \
            --output-dir data/public-sync/input \
            --cache-dir data/public-sync/cache \
            --workers 6 \
            --refresh-recent 60 \
            $FULL_REFRESH_FLAG

      - name: Build report site
        env:
          PYTHONPATH: .vendor
        run: |
          python scripts/build_custom_letterboxd_report.py \
            --input-dir data/public-sync/input \
            --output-dir outputs/public-sync-report \
            --streaming-lookups -1 \
            --streaming-workers 3 \
            --douban-lookups 0 \
            --watched-douban-lookups 0 \
            --ptgen-detail-lookups 600 \
            --streaming-catalog-timeout 0

      - name: Validate generated data
        env:
          PYTHONPATH: .vendor
        run: |
          python scripts/validate_report_data.py \
            --input-dir data/public-sync/input \
            --report-json outputs/public-sync-report/share-site/custom-report-data.json \
            --index-html outputs/public-sync-report/share-site/index.html \
            --output outputs/public-sync-report/share-site/missing_data_report.md

      - name: Update published root files
        run: |
          cp outputs/public-sync-report/share-site/index.html ./index.html
          cp outputs/public-sync-report/share-site/custom-report-data.json ./custom-report-data.json
          cp outputs/public-sync-report/share-site/.nojekyll ./.nojekyll
          cp outputs/public-sync-report/share-site/missing_data_report.md ./missing_data_report.md

      - name: Save sync caches
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            .vendor
            data/public-sync/cache
            outputs/public-sync-report
          key: letterboxd-public-sync-${{ runner.os }}-${{ github.run_id }}

      - name: Commit and push if the site changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git pull --rebase --autostash origin main
          cp outputs/public-sync-report/share-site/index.html ./index.html
          cp outputs/public-sync-report/share-site/custom-report-data.json ./custom-report-data.json
          cp outputs/public-sync-report/share-site/.nojekyll ./.nojekyll
          cp outputs/public-sync-report/share-site/missing_data_report.md ./missing_data_report.md

          if git diff --quiet -- index.html custom-report-data.json missing_data_report.md .nojekyll; then
            echo "No published changes detected."
            exit 0
          fi

          git add index.html custom-report-data.json missing_data_report.md .nojekyll
          git commit -m "Auto-sync Letterboxd public report"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push failed on attempt ${attempt}; rebasing onto origin/main and retrying."
            git pull --rebase --autostash origin main
          done
          git push origin HEAD:main
